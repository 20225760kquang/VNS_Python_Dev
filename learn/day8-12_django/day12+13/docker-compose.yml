services:
  redis:
    image: redis:7-alpine
    container_name: day12_13_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: day12_13_migrate
    command: uv run python manage.py migrate
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: day12_13_web
    command: uv run python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./:/app
      - /app/.venv

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: day12_13_worker
    command: uv run celery -A config worker -l info --concurrency=1
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./:/app
      - /app/.venv
